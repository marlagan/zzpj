eureka:
  client:
    service-url:
      defaultZone: http://eureka-config-service:8761/eureka/
spring:
  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: purrsuit-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: ${MAILTRAP_USERNAME} #change
    password: ${MAILTRAP_PASSWORD} #change
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/purrsuit-realm
          jwk-set-uri: http://keycloak:8080/realms/purrsuit-realm/protocol/openid-connect/certs
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

jwt:
  secret: ""
  expiration: 3600000

