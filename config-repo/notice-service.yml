server:
  port: 8083

  info:
    app:
      name: "Purrsuit notice Service"

spring:
  datasource:
    url: jdbc:postgresql://postgres-db:5432/notice_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
groq:
  api-key: ${GROQ_API_KEY:}