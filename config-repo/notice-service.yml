server:
  port: 8083

  info:
    app:
      name: "Purrsuit notice Service"

datasource:
  url: jdbc:postgresql://localhost:5432/notice_db
  username: admin
  password: admin
  driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect