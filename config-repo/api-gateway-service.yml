server:
  port: 8087

spring:
  application:
    name: api-gateway-service

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
#        - id: user-auth-route
#          uri: lb://user-service
#          predicates:
#            - Path=/api/users/login,/api/users/register todo wrapp keycloack

        - id: user-service-route
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: notice-service
          uri: lb://notice-service
          predicates:
            - Path=/api/notices/**

        - id: pet-service
          uri: lb://pet-service
          predicates:
            - Path=/api/pets/**

        - id: map-service
          uri: lb://map-service
          predicates:
            - Path=/api/maps/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**