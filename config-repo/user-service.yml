server:
  port: 8084

keycloak:
  server-url: http://keycloak:8080
  realm: purrsuit-realm
  admin-username: admin
  admin-password: admin
  client-id: purrsuit-client

spring:
  datasource:
    url: jdbc:postgresql://postgres-db:5432/user_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
