server:
  port: 8082

info:
  app:
    name: "Purrsuit Map Service"
spring:
  datasource:
    url: jdbc:postgresql://postgres-db:5432/map_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

osm:
  email: ${OSM_EMAIL:default-email@example.com}