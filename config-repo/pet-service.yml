server:
  port: 8085

info:
  app:
    name: "Purrsuit Pet Service"

datasource:
  url: jdbc:postgresql://localhost:5432/pet_db
  username: admin
  password: admin
  driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect